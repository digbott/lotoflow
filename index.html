<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏦</text></svg>"/>
  <title>LotoFlow · Fluxo de Caixa para Loterias</title>

  <!-- Estilos -->
  <link rel="stylesheet" href="styles.css?v=3"/>

  <!-- Firebase (ESM — expõe window.__db, window.__auth, etc.) -->
  <script type="module">
    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { initializeAppCheck, ReCaptchaV3Provider }
      from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app-check.js";

  const app = initializeApp({
      apiKey:            "AIzaSyCsQku60SZeMpWBuIDtTE5Jc285zulRDkM",
      authDomain:        "lotoflow-70df5.firebaseapp.com",
      projectId:         "lotoflow-70df5",
      storageBucket:     "lotoflow-70df5.firebasestorage.app",
      messagingSenderId: "185780430132",
      appId:             "1:185780430132:web:e91a81867ed9f01982f161"
    });

    initializeAppCheck(app, {
    provider: new ReCaptchaV3Provider("6Le8J4gsAAAAAMZZD_sJmO43kiRb2pU2s5sYdlFl"),
    isTokenAutoRefreshEnabled: true
  });

    window.__db   = getFirestore(app);
    window.__auth = getAuth(app);
    window.firestoreLib = { doc, getDoc, setDoc, serverTimestamp };
    window.authLib      = { signInWithEmailAndPassword, signOut, onAuthStateChanged };
    window.__firebaseReady = true;
    document.dispatchEvent(new Event("firebaseReady"));
  </script>

  <!-- React 18 (UMD) + Babel Standalone (compila JSX no browser) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Aplicação React (JSX compilado pelo Babel no browser) -->
  <script type="text/babel" data-presets="react" src="app.js?v=3"></script>
</body>
</html>
